services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "127.0.0.1:${BEACON_ELASTIC_ES_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes:
      - beacon-es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "127.0.0.1:${BEACON_ELASTIC_KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  setup:
    image: curlimages/curl:8.10.1
    working_dir: /pack
    volumes:
      - ".:/pack:ro"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    command:
      - sh
      - -eu
      - -c
      - |
        curl -fsS -X PUT http://elasticsearch:9200/_ilm/policy/beacon-endpoint -H 'Content-Type: application/json' --data-binary @ilm-policy.json
        curl -fsS -X PUT http://elasticsearch:9200/_component_template/beacon-endpoint-mappings -H 'Content-Type: application/json' --data-binary @component-template-mappings.json
        curl -fsS -X PUT http://elasticsearch:9200/_component_template/beacon-endpoint-settings -H 'Content-Type: application/json' --data-binary @component-template-settings.json
        curl -fsS -X PUT http://elasticsearch:9200/_index_template/beacon-endpoint -H 'Content-Type: application/json' --data-binary @index-template.json
        curl -fsS -X PUT http://elasticsearch:9200/_ingest/pipeline/beacon-endpoint -H 'Content-Type: application/json' --data-binary @ingest-pipeline.json
        curl -fsS -X POST http://kibana:5601/api/saved_objects/_import?overwrite=true -H 'kbn-xsrf: beacon' --form file=@kibana-assets.ndjson

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.0
    user: root
    command: ["filebeat", "-e", "--strict.perms=false"]
    environment:
      - ES_HOSTS=http://elasticsearch:9200
    volumes:
      - "${BEACON_LOG_DIR}:${BEACON_LOG_DIR}:ro"
      - "./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro"
    depends_on:
      elasticsearch:
        condition: service_healthy
      setup:
        condition: service_completed_successfully

volumes:
  beacon-es-data:
