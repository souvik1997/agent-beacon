name: Beacon Codex Action telemetry

on:
  pull_request:
    paths:
      - action.yml
      - .github/workflows/codex-action-session.yml
      - cli/beacon/**
      - collector-builder/exporter/beaconjsonexporter/**
      - examples/github-actions/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codex-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/beacon/go.mod

      - name: Build branch Beacon CLI
        run: |
          set -euo pipefail
          mkdir -p /tmp/beacon-session-test
          cd cli/beacon
          go build -o /tmp/beacon-session-test/beacon .

      - name: Download released Beacon collector
        run: |
          set -euo pipefail
          archive=/tmp/beacon-session-test/beacon.tgz
          curl -fsSL \
            https://github.com/asymptote-labs/agent-beacon/releases/download/v0.0.49/beacon_0.0.49_linux_amd64.tar.gz \
            -o "$archive"
          tar -xzf "$archive" -C /tmp/beacon-session-test beacon-otelcol
          chmod +x /tmp/beacon-session-test/beacon /tmp/beacon-session-test/beacon-otelcol

      - name: Start Beacon telemetry
        id: beacon
        uses: ./
        with:
          mode: start
          binary-path: /tmp/beacon-session-test/beacon
          harnesses: codex

      - name: Run Codex Action
        uses: openai/codex-action@main
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          codex-home: ${{ steps.beacon.outputs.codex-home }}
          prompt: "Summarize this pull request and list one potential risk. Do not modify files."
          sandbox: read-only
          safety-strategy: read-only

      - name: Finish Beacon telemetry
        if: always()
        uses: ./
        with:
          mode: finish
          binary-path: /tmp/beacon-session-test/beacon
          min-events: "1"
          upload-artifact: "true"
          artifact-name: beacon-codex-action-runtime-log
