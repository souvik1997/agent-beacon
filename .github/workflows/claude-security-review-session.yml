name: Beacon Claude Security Review telemetry

on:
  pull_request:
    paths:
      - action.yml
      - .github/workflows/claude-security-review-session.yml
      - cli/beacon/**
      - collector-builder/exporter/beaconjsonexporter/**
      - examples/github-actions/**
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  security-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/beacon/go.mod

      - name: Build branch Beacon CLI
        run: |
          set -euo pipefail
          mkdir -p /tmp/beacon-session-test
          cd cli/beacon
          go build -o /tmp/beacon-session-test/beacon .

      - name: Download released Beacon collector
        run: |
          set -euo pipefail
          archive=/tmp/beacon-session-test/beacon.tgz
          curl -fsSL \
            https://github.com/asymptote-labs/agent-beacon/releases/download/v0.0.49/beacon_0.0.49_linux_amd64.tar.gz \
            -o "$archive"
          tar -xzf "$archive" -C /tmp/beacon-session-test beacon-otelcol
          chmod +x /tmp/beacon-session-test/beacon /tmp/beacon-session-test/beacon-otelcol

      - name: Start Beacon telemetry
        uses: ./
        with:
          mode: start
          binary-path: /tmp/beacon-session-test/beacon
          harnesses: claude

      - name: Run Claude Code Security Review
        uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          comment-pr: false
          upload-results: true
          claudecode-timeout: "10"
          run-every-commit: true

      - name: Finish Beacon telemetry
        if: always()
        uses: ./
        with:
          mode: finish
          binary-path: /tmp/beacon-session-test/beacon
          min-events: "1"
          upload-artifact: "true"
          artifact-name: beacon-claude-security-review-runtime-log
